services:
  - type: web
    name: phoenix-air
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EXTERNAL_API_BASE
        value: https://zz1mpoguje.execute-api.us-east-1.amazonaws.com/default/airline-assessment
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: OTP_FALLBACK_EMAIL
        sync: false
      - key: DATABASE_PATH
        value: ./airline.db
